<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#06B6D4" stroke-width="0.5" opacity="0.08"/>
    </pattern>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#06B6D4" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect width="100%" height="100%" fill="url(#dots)"/>
  <!-- Random connection lines for network feel -->
  <g stroke="#06B6D4" stroke-width="0.5" opacity="0.06">
    <line x1="120" y1="80" x2="300" y2="200"/>
    <line x1="300" y1="200" x2="500" y2="150"/>
    <line x1="500" y1="150" x2="700" y2="300"/>
    <line x1="700" y1="300" x2="900" y2="250"/>
    <line x1="900" y1="250" x2="1100" y2="400"/>
    <line x1="1100" y1="400" x2="1300" y2="350"/>
    <line x1="1300" y1="350" x2="1500" y2="500"/>
    <line x1="1500" y1="500" x2="1700" y2="450"/>
    <line x1="1700" y1="450" x2="1800" y2="600"/>
    <line x1="200" y1="400" x2="400" y2="500"/>
    <line x1="400" y1="500" x2="600" y2="450"/>
    <line x1="600" y1="450" x2="800" y2="600"/>
    <line x1="800" y1="600" x2="1000" y2="550"/>
    <line x1="1000" y1="550" x2="1200" y2="700"/>
    <line x1="1200" y1="700" x2="1400" y2="650"/>
    <line x1="1400" y1="650" x2="1600" y2="800"/>
    <line x1="1600" y1="800" x2="1750" y2="750"/>
    <line x1="100" y1="700" x2="300" y2="800"/>
    <line x1="300" y1="800" x2="500" y2="750"/>
    <line x1="500" y1="750" x2="700" y2="900"/>
    <line x1="700" y1="900" x2="950" y2="850"/>
    <line x1="950" y1="850" x2="1150" y2="1000"/>
  </g>
  <!-- Network nodes -->
  <g fill="#06B6D4" opacity="0.1">
    <circle cx="120" cy="80" r="3"/>
    <circle cx="300" cy="200" r="2.5"/>
    <circle cx="500" cy="150" r="3"/>
    <circle cx="700" cy="300" r="2"/>
    <circle cx="900" cy="250" r="3"/>
    <circle cx="1100" cy="400" r="2.5"/>
    <circle cx="1300" cy="350" r="3"/>
    <circle cx="1500" cy="500" r="2"/>
    <circle cx="1700" cy="450" r="3"/>
    <circle cx="1800" cy="600" r="2.5"/>
    <circle cx="200" cy="400" r="2"/>
    <circle cx="600" cy="450" r="3"/>
    <circle cx="1000" cy="550" r="2.5"/>
    <circle cx="1400" cy="650" r="3"/>
    <circle cx="1600" cy="800" r="2"/>
    <circle cx="100" cy="700" r="2.5"/>
    <circle cx="500" cy="750" r="3"/>
    <circle cx="950" cy="850" r="2"/>
    <circle cx="1150" cy="1000" r="2.5"/>
  </g>
</svg>