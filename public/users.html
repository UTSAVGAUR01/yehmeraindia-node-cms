<!doctype html><html><body><h1>Users</h1><div id='u'></div><script src='/js/api.js'></script><script>async function l(){const d=await api('/api/admin/users');u.innerHTML=d.map(x=>`<div>${x.name} (${x.role}/${x.status}) <button onclick="role(${x.id},'viewer')">Viewer</button> <button onclick="role(${x.id},'editor')">Editor</button> <button onclick="st(${x.id},'active')">Enable</button> <button onclick="st(${x.id},'disabled')">Disable</button></div>`).join('')}async function role(id,role){await api('/api/admin/users/'+id+'/role',{method:'PUT',body:JSON.stringify({role})});l()}async function st(id,status){await api('/api/admin/users/'+id+'/status',{method:'PUT',body:JSON.stringify({status})});l()}l();</script></body></html>
