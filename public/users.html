<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="/admin-shell.css"></head><body><div class='top'><a href='/'>Home</a><a href='/news'>News</a><a href='/trending'>Trending</a><a href='/categories.html'>Categories</a><a href='/ai-reporter'>AI Reporter</a><a href='/dashboard.html'>Dashboard</a><a href='/posts.html'>Posts</a><a href='/create-post.html'>Create</a><a href='/cleanup.html'>Cleanup</a></div><h1>Users</h1><div id='u'></div><script src='/js/api.js'></script><script>async function l(){const d=await api('/api/admin/users');u.innerHTML=d.map(x=>`<div>${x.name} (${x.role}/${x.status}) <button onclick="role(${x.id},'viewer')">Viewer</button> <button onclick="role(${x.id},'editor')">Editor</button> <button onclick="st(${x.id},'active')">Enable</button> <button onclick="st(${x.id},'blocked')">Disable</button></div>`).join('')}async function role(id,role){await api('/api/admin/users/'+id+'/role',{method:'PUT',body:JSON.stringify({role})});l()}async function st(id,status){await api('/api/admin/users/'+id+'/status',{method:'PUT',body:JSON.stringify({status})});l()}l();</script></body></html>
