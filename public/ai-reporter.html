<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>AI Reporter</title><link rel='stylesheet' href='/css/style.css'></head><body><script src='/js/portal.js'></script><script>document.write(Portal.topbar())</script><main class='container layout-2' style='margin-top:16px'><section class='panel'><h1>AI Reporter</h1><div class='card' style='display:grid;grid-template-columns:220px 1fr;gap:12px;padding:12px'><img src='/images/ai-avatar.svg' style='width:220px;height:260px;object-fit:cover;border-radius:12px'><div><p>Namaste! I bring latest AI-assisted headlines from India.</p><input style='width:100%;padding:12px;border-radius:999px;border:1px solid #ccc' placeholder='Ask me anything...'></div></div><h3>Latest AI Stories</h3><div id='feed'></div></section><aside class='panel'><h3>Topics</h3><div class='pills'><span class='pill'>#Budget</span><span class='pill'>#IndiaAI</span><span class='pill'>#G20</span></div></aside></main><script>(async()=>{const posts=await Portal.API.json('/api/feed/ai-reporter',[]);document.getElementById('feed').innerHTML=posts.slice(0,8).map(p=>`<div class='card' style='display:grid;grid-template-columns:100px 1fr;margin:8px 0'><img src='${Portal.API.esc(p.image||'/images/news-3.svg')}'><div class='card-body'><a href='/news/${p.slug}'><b>${Portal.API.esc(p.title)}</b></a><div class='meta'>${new Date(p.created_at||Date.now()).toLocaleTimeString()}</div></div></div>`).join('');})();</script></body></html>
