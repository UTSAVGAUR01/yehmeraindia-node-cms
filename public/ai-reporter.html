<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='/css/style.css'><title>AI Reporter Reels Feed</title></head><body>
<header class='top'><div class='brand'>🤖 AI Reporter Reels Feed</div><nav class='nav'><a href='/'>Home</a><a href='/dashboard.html'>Dashboard</a></nav></header>
<div class='container reels-layout'><main id='reels' class='reels-feed'></main><aside class='filter card'><h3>Filters</h3><select id='category'><option value=''>All categories</option><option value='ai-reporter'>AI Reporter</option><option value='india-stories'>India Stories</option></select><label><input type='checkbox' id='breakingOnly'> Breaking only</label></aside></div>
<script src='/js/api.js'></script><script>
let data=[];
function render(){const cat=category.value;const br=breakingOnly.checked;const list=data.filter(p=>(!cat||p.category===cat)&&(!br||p.is_breaking));reels.innerHTML=list.map(p=>`<article class='reel-card'><div class='reel-visual' style='background:${p.visual||'linear-gradient(160deg,#ff8f00,#0b1f4d)'}'><span class='badge'>AI Reporter</span>${p.is_breaking?'<span class="badge red">Breaking</span>':''}<h3>${p.title}</h3><p>${p.summary||p.excerpt||''}</p><small>${p.source_name||'Yeh Mera India'} • ${p.category||''}</small></div><div class='reel-actions'><button>Like</button><button>Comment</button><button>Share</button><button>Save</button><a class='btn' href='/news/${p.slug}'>Read Full</a></div></article>`).join('');}
async function load(){data=await api('/api/feed/ai-reporter');render()}category.onchange=render;breakingOnly.onchange=render;load();
</script></body></html>
