<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='/css/style.css'><title>AI Reporter Reels</title></head><body><div class='top'><b>🤖 AI Reporter Reels</b><div class='nav'><a href='/'>Home</a><a href='/news'>News</a></div></div>
<div class='container' style='display:grid;grid-template-columns:2fr 1fr;gap:16px'><div id='reels' class='grid cards'></div><aside class='card'><h3>Filters</h3><select id='cat'><option value=''>All</option><option value='ai-reporter'>AI Reporter</option><option value='india-stories'>India Stories</option></select></aside></div>
<script src='/js/api.js'></script><script>const demo=[{title:'AI Reporter Special: Bharat Innovation Roundup',slug:'ai-reporter-special-bharat-innovation-roundup',summary:'Top innovation updates from Bharat with verified context.',category:'ai-reporter',source_name:'YMI AI Desk',is_breaking:1},{title:'Sports & Youth: Positive India Updates',slug:'sports-youth-positive-india-updates',summary:'Young achievers and sports stories shaping new India.',category:'india-stories',source_name:'YMI AI Desk'}];const slugify=t=>(t||'news').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');function actions(p){const u=location.origin+'/news/'+(p.slug||slugify(p.title));return `<button onclick="alert('Liked')">Like</button> <button onclick="alert('Comment')">Comment</button> <button onclick="navigator.share?navigator.share({title:${JSON.stringify('AI Reporter')},text:${JSON.stringify('Read this story')},url:${JSON.stringify(''+location.origin)}}):navigator.clipboard.writeText('${u}')">Share</button> <button onclick="alert('Saved')">Save</button> <a class='btn' href='${u}'>Read Full</a>`}async function load(){let posts=[];try{posts=await api('/api/feed/ai-reporter')}catch{}if(!posts.length)posts=demo;const c=cat.value;posts=posts.filter(p=>!c||p.category===c);reels.innerHTML=posts.map(p=>`<article class='card'><div class='reel'><span class='badge'>AI Reporter</span> ${p.is_breaking?`<span class='badge breaking'>Breaking</span>`:''}<h3>${p.title}</h3><p>${p.summary||p.excerpt||''}</p><small>${p.category||''} • ${p.source_name||'YMI'}</small></div><div style='margin-top:8px'>${actions(p)}</div></article>`).join('')}cat.onchange=load;load();</script></body></html>
