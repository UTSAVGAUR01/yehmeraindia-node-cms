<!doctype html><html><head><meta charset='UTF-8'><link rel='stylesheet' href='/css/style.css'><title>AI Reporter Reels Feed</title></head><body><div class='top'><b>AI Reporter Reels Feed</b><div class='nav'><a href='/'>Home</a><a href='/dashboard.html'>Dashboard</a></div></div>
<div class='container' style='display:grid;grid-template-columns:2fr 1fr;gap:16px'><div id='reels' class='grid' style='grid-template-columns:repeat(auto-fit,minmax(230px,1fr))'></div><div class='card'><h3>Filters</h3><select id='cat'><option value=''>All</option><option>ai-reporter</option><option>india-stories</option></select></div></div>
<script src='/js/api.js'></script><script>async function load(){let posts=[];try{posts=await api('/api/feed/ai-reporter')}catch{}if(!posts.length)posts=[{title:'AI Breaking Demo',summary:'Demo reel card',category:'ai-reporter',source_name:'Demo'}];const cat=document.getElementById('cat').value;const list=posts.filter(p=>!cat||p.category===cat);document.getElementById('reels').innerHTML=list.map(p=>`<div class='card'><div class='reel'><span>🤖 AI Reporter</span><h3>${p.title}</h3><p>${p.summary||p.excerpt||''}</p><small>${p.source_name||'YMI'}</small></div><p>${p.category||''}</p><button onclick="alert('Liked')">Like</button> <button onclick="alert('Comment')">Comment</button> <button onclick="navigator.share?navigator.share({title:'${'AI'}',text:'${'News'}'}):alert('Share')">Share</button> <button onclick="alert('Saved')">Save</button> <a class='btn' href='/news/${p.slug||''}'>Read Full</a></div>`).join('')}document.getElementById('cat').onchange=load;load();</script></body></html>
