<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Reporter • Yeh Mera India</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');
    .reel-card { aspect-ratio: 9/16; scroll-snap-align: start; }
    .reel-container { scrollbar-width: none; }
    .reel-container::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-slate-50">
  <!-- Navbar same as index.html (copy-paste from above) -->

  <header class="bg-gradient-to-r from-[#FF671F] via-[#06038D] to-[#138808] text-white py-12 text-center">
    <h1 class="text-5xl font-bold">AI Reporter Reels</h1>
    <p class="text-2xl mt-3">9:16 vertical stories • Fresh AI content every hour</p>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <div id="reels-container" class="reel-container grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 max-h-[85vh] overflow-y-auto snap-y snap-mandatory"></div>
  </div>

  <script>
    async function loadReels() {
      const container = document.getElementById('reels-container');
      try {
        const res = await fetch('/api/feed/ai-reporter');
        let posts = await res.json();
        if (!posts.length) posts = [{id:1,title:"Demo Reel",headline:"Positive India Today",caption:"AI generated for Bharat",slug:"demo1"}];
        
        container.innerHTML = posts.map(post => `
          <div onclick="window.location.href='/news/${post.slug}'" class="reel-card bg-white rounded-3xl overflow-hidden shadow-2xl cursor-pointer border border-[#FF671F]/20">
            <div class="relative h-full w-full bg-slate-900">
              <div class="absolute inset-0 bg-gradient-to-br from-[#FF671F]/30 to-[#138808]/30 flex items-center justify-center text-white text-8xl">▶</div>
              <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-6 text-white">
                <div class="text-[#FF671F] text-xs font-bold mb-2">🤖 AI GENERATED</div>
                <h3 class="text-xl font-semibold line-clamp-3">${post.headline || post.title}</h3>
                <p class="text-sm mt-3 opacity-90">${post.caption || post.summary}</p>
              </div>
            </div>
          </div>
        `).join('');
      } catch(e) {
        container.innerHTML = `<div class="col-span-full text-center py-20 text-2xl">Loading AI Reels...</div>`;
      }
    }
    window.onload = loadReels;
  </script>
</body>
</html>
