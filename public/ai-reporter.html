<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>AI Reporter</title><link rel='stylesheet' href='/css/style.css'></head><body>
<header class='topbar'><div class='container nav'><div class='logo'><span>Yeh Mera</span> <span>India</span></div><nav class='links'><a href='/'>Home</a><a href='/ai-reporter'>AI Reporter</a></nav></div></header>
<main class='container layout-2' style='margin-top:20px'><section class='panel'><h1>AI Reporter</h1><div class='card' style='display:grid;grid-template-columns:220px 1fr;gap:12px;padding:12px'><img src='/images/ai-avatar.svg' style='width:220px;height:260px;object-fit:cover;border-radius:12px'><div><p>Namaste! I bring latest verified AI-assisted India stories.</p><input style='width:100%;padding:12px;border-radius:999px;border:1px solid #ccc' placeholder='Ask me anything...'></div></div><h3>Latest AI Generated Stories</h3><div id='feed'></div></section><aside class='panel'><h3>Trending Topics</h3><div class='pills'><span class='pill'>#Budget2025</span><span class='pill'>#IndiaAI</span><span class='pill'>#MakeInIndia</span></div></aside></main>
<script>(async()=>{const posts=await fetch('/api/feed/ai-reporter').then(r=>r.json()).catch(()=>[]);document.getElementById('feed').innerHTML=posts.slice(0,6).map(p=>`<div class='card' style='display:grid;grid-template-columns:100px 1fr;margin:8px 0'><img src='${p.image||'/images/news-3.svg'}'><div class='card-body'><a href='/news/${p.slug}'><b>${p.title}</b></a><div class='meta'>${new Date(p.created_at||Date.now()).toLocaleTimeString()}</div></div></div>`).join('');})();</script>
</body></html>
