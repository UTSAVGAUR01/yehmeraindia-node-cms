<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News • Yeh Mera India</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50">
  <!-- Navbar (copy from index.html) -->
  <div class="max-w-7xl mx-auto px-6 py-12">
    <h1 class="text-5xl font-bold mb-10">Latest News</h1>
    <div id="news-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </div>

  <script>
    async function loadNews() {
      const res = await fetch('/api/posts');
      const posts = await res.json();
      const container = document.getElementById('news-list');
      container.innerHTML = posts.map(p => `
        <a href="/news/${p.slug}" class="block bg-white rounded-3xl p-6 shadow hover:shadow-2xl transition">
          <h3 class="font-semibold text-2xl">${p.title}</h3>
          <p class="text-gray-600 mt-3 line-clamp-3">${p.excerpt || p.summary}</p>
          <div class="text-xs text-[#FF671F] mt-6">AI Generated • ${new Date(p.created_at).toLocaleDateString('en-IN')}</div>
        </a>
      `).join('');
    }
    window.onload = loadNews;
  </script>
</body>
</html>
