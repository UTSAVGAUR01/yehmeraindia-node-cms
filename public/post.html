<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='/css/style.css'><title>Article | Yeh Mera India</title></head><body><div class='top'><b>Yeh Mera India</b><div class='nav'><a href='/news'>All News</a></div></div><main class='container'><article id='article' class='card'></article></main><script src='/js/api.js'></script><script>const parts=location.pathname.split('/').filter(Boolean);const slug=parts[1]||parts[0]||'';function n(x){return x||''}async function load(){try{const p=await api('/api/posts/'+slug);article.innerHTML=`<p class='badge'>AI-assisted</p><h1>${n(p.title)}</h1><p>${n(p.source_name||'YMI Desk')} • ${p.published_at?new Date(p.published_at).toLocaleString():''}</p><p>${n(p.summary||p.excerpt)}</p><div style='white-space:pre-wrap'>${n(p.content)}</div>${p.anchor_script?`<h3>Anchor Script</h3><pre>${p.anchor_script}</pre>`:''}${p.visual_prompt?`<h3>Visual Prompt</h3><pre>${p.visual_prompt}</pre>`:''}<a class='btn' href='/news'>Back to News</a>`}catch(e){article.innerHTML=`<h2>Article not found</h2><p>${e.message}</p><a class='btn' href='/news'>Back to News</a>`}}load();</script></body></html>
