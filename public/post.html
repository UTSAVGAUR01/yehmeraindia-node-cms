<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Story</title><link rel='stylesheet' href='/css/style.css'></head><body>
<header class='topbar'><div class='container nav'><div class='logo'><span>Yeh Mera</span> <span>India</span></div><nav class='links'><a href='/'>Home</a><a href='/trending'>Trending</a><a href='/ai-reporter'>AI Reporter</a></nav></div></header>
<main class='container layout-2' style='margin-top:20px'><article id='post' class='panel'></article><aside class='panel'><h3>More Like This</h3><div id='more'></div></aside></main>
<script>const slug=location.pathname.split('/').pop();const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));(async()=>{const p=await fetch('/api/posts/'+slug).then(r=>r.json());document.getElementById('post').innerHTML=`<div class='pill active'>${esc(p.category||'India')}</div><h1>${esc(p.title)}</h1><p class='meta'>${new Date(p.created_at||Date.now()).toLocaleDateString()}</p><img style='width:100%;border-radius:12px' src='${esc(p.image||'/images/news-2.svg')}'><p>${esc(p.content||'')}</p><div class='panel' style='background:#fff7ed'>Disclaimer: ${esc(p.disclaimer||'AI-assisted content. Editor verification required.')}</div>`;const list=await fetch('/api/trending').then(r=>r.json()).catch(()=>[]);document.getElementById('more').innerHTML=list.slice(0,5).map(x=>`<p><a href='/news/${x.slug}'>${esc(x.title)}</a></p>`).join('');})();</script>
</body></html>
