<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Story</title><link rel='stylesheet' href='/css/style.css'></head><body><script src='/js/portal.js'></script><script>document.write(Portal.topbar())</script><main class='container layout-2' style='margin-top:16px'><article id='post' class='panel'></article><aside class='panel'><h3>More Like This</h3><div id='more'></div></aside></main><script>(async()=>{const slug=location.pathname.split('/').pop();const p=await Portal.API.json('/api/posts/'+slug,{});document.getElementById('post').innerHTML=`<div class='pill active'>${Portal.API.esc(p.category||'India')}</div><h1>${Portal.API.esc(p.title||'Story')}</h1><p class='meta'>${new Date(p.created_at||Date.now()).toLocaleString()}</p><img style='width:100%;border-radius:12px' src='${Portal.API.esc(p.image||'/images/news-2.svg')}'><p>${Portal.API.esc(p.content||'')}</p><div class='panel' style='background:#fff7ed'>Disclaimer: ${Portal.API.esc(p.disclaimer||'AI-assisted content. Verify before sharing.')}</div>`;const t=await Portal.API.json('/api/trending',[]);document.getElementById('more').innerHTML=t.slice(0,6).map(x=>`<p><a href='/news/${x.slug}'>${Portal.API.esc(x.title)}</a></p>`).join('');})();</script></body></html>
