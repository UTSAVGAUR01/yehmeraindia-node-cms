<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article | Yeh Mera India</title>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom site styles -->
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg-gray-50 text-gray-900">
  <!-- Site header -->
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-orange-600 font-bold text-xl">Yeh Mera India</a>
      <nav class="text-sm font-semibold text-gray-600 space-x-4">
        <a href="/" class="hover:text-orange-600">Home</a>
        <a href="/trending.html" class="hover:text-orange-600">Trending</a>
        <a href="/ai-reporter.html" class="hover:text-orange-600">AI Reporter</a>
      </nav>
    </div>
  </header>

  <!-- Article content -->
  <main class="max-w-4xl mx-auto px-4 py-10">
    <article id="article" class="bg-white border rounded-[2rem] p-6 md:p-10 shadow-md"></article>
  </main>

  <!-- Site footer -->
  <footer class="bg-gray-900 text-white py-6 mt-10 text-center text-sm">
    © 2026 Yeh Mera India
  </footer>

  <script>
    // Extract the slug from the current URL (e.g. /post/my-first-post)
    const slug = window.location.pathname.split('/').pop();

    // Fetch the post data from the API and render it
    fetch('/api/posts/' + slug)
      .then(res => res.json())
      .then(post => {
        const container = document.getElementById('article');
        if (!post || post.message) {
          container.innerHTML = '<h1 class="text-3xl font-bold">Article not found</h1>';
          return;
        }

        // Update the page title for SEO
        document.title = post.title + ' | Yeh Mera India';

        // Build the article markup
        const image = post.image
          ? `<img src="/uploads/${post.image}" class="w-full rounded-[2rem] mb-8" />`
          : '';

        const shareUrl = encodeURIComponent(window.location.href);
        const shareText = encodeURIComponent(post.title);

        const html = `
          ${image}
          <p class="text-sm font-semibold text-orange-600 mb-2">Yeh Mera India</p>
          <h1 class="text-4xl md:text-5xl font-extrabold mb-4 leading-tight">${post.title}</h1>
          <p class="text-gray-500 mb-6">By ${post.author_name || 'Yeh Mera India'} &bull; ${new Date(post.created_at).toLocaleDateString()}</p>
          <div class="prose prose-lg max-w-none mb-8 whitespace-pre-line">${post.content}</div>
          <div class="flex gap-4 mt-10">
            <a target="_blank" href="https://wa.me/?text=${shareText}%20${shareUrl}" class="px-5 py-3 rounded-xl bg-green-600 text-white font-semibold">Share on WhatsApp</a>
            <button onclick="navigator.clipboard.writeText(window.location.href); alert('Link copied')" class="px-5 py-3 rounded-xl bg-gray-900 text-white font-semibold">Copy Link</button>
          </div>
        `;

        container.innerHTML = html;
      })
      .catch(() => {
        document.getElementById('article').innerHTML = '<h1 class="text-3xl font-bold">Article not found</h1>';
      });
  </script>
</body>
</html>
