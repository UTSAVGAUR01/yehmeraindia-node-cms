<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post • Yeh Mera India</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="max-w-4xl mx-auto px-6 py-12">
    <div id="post-content"></div>
  </div>

  <script>
    async function loadPost() {
      const slug = window.location.pathname.split('/').pop();
      const res = await fetch(`/api/posts/${slug}`);
      const post = await res.json();
      document.getElementById('post-content').innerHTML = `
        <h1 class="text-5xl font-bold">${post.title || post.headline}</h1>
        <p class="text-[#FF671F] mt-6">${post.caption || ''}</p>
        <div class="prose max-w-none mt-10 text-lg">${post.content || post.article}</div>
        <div class="mt-12 bg-amber-50 border border-[#FF671F] rounded-3xl p-6 text-sm">
          <strong>Disclaimer:</strong> ${post.disclaimer || 'This article was generated with AI assistance and has been reviewed by our editorial team.'}
        </div>
      `;
    }
    window.onload = loadPost;
  </script>
</body>
</html>
