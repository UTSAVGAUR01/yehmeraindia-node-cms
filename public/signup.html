<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account | Yeh Mera India</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-100 via-white to-orange-100 py-10 px-4">
  <div class="w-full max-w-md bg-white/90 backdrop-blur-xl border rounded-3xl shadow-2xl p-8">
    <a href="/" class="text-sm font-bold text-orange-600">← Back to home</a>
    <h1 class="text-4xl font-black mt-6">Create account</h1>
    <p class="text-gray-500 mt-2">Signup request will be reviewed by admin.</p>
    <form id="signupForm" class="mt-8 space-y-5">
      <div>
        <label class="text-sm font-bold">Name</label>
        <input id="name" required class="mt-2 w-full px-4 py-3 rounded-2xl border focus:outline-none focus:ring-2 focus:ring-orange-500">
      </div>
      <div>
        <label class="text-sm font-bold">Email</label>
        <input id="email" type="email" required class="mt-2 w-full px-4 py-3 rounded-2xl border focus:outline-none focus:ring-2 focus:ring-orange-500">
      </div>
      <div>
        <label class="text-sm font-bold">Password</label>
        <input id="password" type="password" required minlength="6" class="mt-2 w-full px-4 py-3 rounded-2xl border focus:outline-none focus:ring-2 focus:ring-orange-500">
      </div>
      <button type="submit" class="w-full py-4 rounded-2xl bg-orange-600 text-white font-black hover:bg-orange-700">Sign up</button>
    </form>
    <p id="message" class="mt-5 text-sm font-semibold"></p>
    <p class="text-sm text-gray-500 mt-6">Already have an account? <a href="/login.html" class="font-bold text-orange-600">Sign in</a></p>
  </div>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      const msg = document.getElementById('message');
      if (!res.ok) {
        msg.textContent = data.message;
        msg.className = 'mt-5 text-sm font-semibold text-red-600';
        return;
      }
      msg.textContent = data.message;
      msg.className = 'mt-5 text-sm font-semibold text-green-600';
    });
  </script>
</body>
</html>
