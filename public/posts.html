<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="/admin-shell.css"></head><body><div class='top'><a href='/'>Home</a><a href='/news'>News</a><a href='/trending'>Trending</a><a href='/categories.html'>Categories</a><a href='/ai-reporter'>AI Reporter</a><a href='/dashboard.html'>Dashboard</a><a href='/posts.html'>Posts</a><a href='/create-post.html'>Create</a><a href='/cleanup.html'>Cleanup</a></div><div class='main'><h1>Posts</h1><a href='/create-post.html'>Create Post</a><table class='table'><thead><tr><th>Title</th><th>Category</th><th>Status</th><th>AI</th><th>Actions</th></tr></thead><tbody id='tb'></tbody></table></div><script src='/js/api.js'></script><script>async function l(){const d=await api('/api/admin/posts');tb.innerHTML=d.map(p=>`<tr><td>${p.title}</td><td>${p.category||''}</td><td>${p.status}</td><td>${p.ai_generated?'Yes':'No'}</td><td><a href='/news/${p.slug}'>View</a> <button onclick='pub(${p.id})'>Publish</button> <button onclick='del(${p.id})'>Delete</button></td></tr>`).join('')} async function del(id){await api('/api/admin/posts/'+id,{method:'DELETE'});l()} async function pub(id){await api('/api/admin/posts/'+id,{method:'PUT',body:JSON.stringify({status:'published'})});l()} l();</script></body></html>
