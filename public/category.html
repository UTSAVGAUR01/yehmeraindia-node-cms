<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category | Yeh Mera India</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg-gray-50 text-gray-900">
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-orange-600 font-bold text-xl">Yeh Mera India</a>
      <nav class="text-sm font-semibold text-gray-600 space-x-4">
        <a href="/" class="hover:text-orange-600">Home</a>
        <a href="/trending.html" class="hover:text-orange-600">Trending</a>
        <a href="/ai-reporter.html" class="hover:text-orange-600">AI Reporter</a>
      </nav>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 py-10">
    <h1 id="categoryName" class="text-4xl font-bold mb-8"></h1>
    <div id="categoryGrid" class="grid md:grid-cols-3 gap-8"></div>
    <p id="noCategory" class="hidden text-center text-gray-600 mt-10">No posts found for this category.</p>
  </main>
  <footer class="bg-gray-900 text-white py-6 mt-10 text-center text-sm">
    © 2026 Yeh Mera India
  </footer>
  <script>
    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }
    const slug = getQueryParam('slug');
    if (!slug) {
      document.getElementById('noCategory').textContent = 'Invalid category.';
      document.getElementById('noCategory').classList.remove('hidden');
    } else {
      fetch('/api/category/' + slug).then(res => res.json()).then(posts => {
        const grid = document.getElementById('categoryGrid');
        if (!posts || posts.length === 0) {
          document.getElementById('noCategory').classList.remove('hidden');
          return;
        }
        // Set category name
        document.getElementById('categoryName').textContent = posts[0].category_name || slug;
        posts.forEach(post => {
          const card = document.createElement('article');
          card.className = 'bg-white border rounded-2xl overflow-hidden shadow hover:shadow-md transition';
          const img = post.image ? `<img src="/uploads/${post.image}" class="w-full h-48 object-cover" />` : `<div class="w-full h-48 bg-gradient-to-br from-orange-200 to-green-200 flex items-center justify-center font-bold text-gray-700">${post.category_name ? post.category_name[0] : 'Y'}</div>`;
          card.innerHTML = img + `
            <div class="p-4">
              <h3 class="font-bold text-lg mb-2">${post.title}</h3>
              <p class="text-sm text-gray-600 mb-4">${post.excerpt || post.content.substring(0, 100)}...</p>
              <div class="flex items-center justify-between text-xs text-gray-500">
                <span>${new Date(post.created_at).toLocaleDateString()}</span>
                <span>${post.views} views</span>
              </div>
              <div class="mt-4 flex justify-between">
                <a href="/post/${post.slug}" class="text-orange-600 font-semibold">Read more</a>
                <a href="https://wa.me/?text=${encodeURIComponent(post.title)}%20${encodeURIComponent(window.location.origin+'/post/'+post.slug)}" target="_blank" class="text-green-600 font-semibold">Share</a>
              </div>
            </div>`;
          grid.appendChild(card);
        });
      }).catch(() => {
        document.getElementById('noCategory').classList.remove('hidden');
      });
    }
  </script>
</body>
</html>
