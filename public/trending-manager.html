<!doctype html><html><body><h1>Trending Manager</h1><button onclick='load()'>Refresh</button><div id='x'></div><script src='/js/api.js'></script><script>async function load(){const d=await api('/api/admin/trending');x.innerHTML=d.map(p=>`<div>${p.title} <button onclick='tr(${p.id},${p.is_trending?0:1})'>${p.is_trending?'Unmark':'Mark'} trending</button> <button onclick='br(${p.id},${p.is_breaking?0:1})'>${p.is_breaking?'Unmark':'Mark'} breaking</button></div>`).join('')}async function tr(id,v){await api('/api/admin/posts/'+id+'/trending',{method:'PUT',body:JSON.stringify({is_trending:v})});load()}async function br(id,v){await api('/api/admin/posts/'+id+'/breaking',{method:'POST',body:JSON.stringify({is_breaking:v})});load()}load();</script></body></html>
