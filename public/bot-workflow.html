<!doctype html><html><body><h1>Bot Workflow</h1><div id='b'></div><script src='/js/api.js'></script><script>const bots=['threatGuardBot','trendCollectorBot','freshnessBot','newsAnalysisBot','newsWriterBot','visualizerBot','aiAnchorBot','publisherBot','cleanupBot'];async function load(){const s=await api('/api/admin/bots/status');b.innerHTML=bots.map(n=>`<div><b>${n}</b> <button onclick="run('${n}')">Run</button></div>`).join('')}async function run(bot){alert(JSON.stringify(await api('/api/admin/bots/run',{method:'POST',body:JSON.stringify({bot})})))}load();</script></body></html>
