<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="/admin-shell.css"></head><body><div class='top'><a href='/'>Home</a><a href='/news'>News</a><a href='/trending'>Trending</a><a href='/categories.html'>Categories</a><a href='/ai-reporter'>AI Reporter</a><a href='/dashboard.html'>Dashboard</a><a href='/posts.html'>Posts</a><a href='/create-post.html'>Create</a><a href='/cleanup.html'>Cleanup</a></div><div class='admin'><div class='side'>
<a href='/dashboard.html'>Overview</a><a href='/posts.html'>Posts</a><a href='/create-post.html'>Create Post</a><a href='/trending-manager.html'>Trending Manager</a><a href='/ai-reporter-admin.html'>AI Reporter</a><a href='/users.html'>Users</a><a href='/categories-admin.html'>Categories</a><a href='/cleanup.html'>Cleanup</a><a href='/bot-workflow.html'>Bot Workflow</a><a href='/'>View Site</a><a href='#' id='logout'>Logout</a></div>
<div class='main'><h1>Dashboard</h1><div id='stats' class='stats'></div><h3>Recent Posts</h3><table class='table'><tbody id='recent'></tbody></table></div></div>
<script src='/js/api.js'></script><script>document.getElementById('logout').onclick=async()=>{await api('/api/auth/logout',{method:'POST'});location='/login.html'};async function load(){const d=await api('/api/admin/dashboard');document.getElementById('stats').innerHTML=[['Total',d.totalPosts],['Published',d.publishedPosts],['Pending',d.pendingPosts],['AI',d.aiGeneratedPosts],['Trending',d.trendingPosts],['Users',d.users],['Deleted Today',d.deletedToday]].map(x=>`<div class=stat><b>${x[0]}</b><div>${x[1]??0}</div></div>`).join('');document.getElementById('recent').innerHTML=(d.recentPosts||[]).map(p=>`<tr><td>${p.title}</td><td>${p.status}</td></tr>`).join('')||'<tr><td>No posts</td></tr>'}load().catch((err)=>{if(err&&err.status===401){location='/login.html';return;}document.getElementById('recent').innerHTML=`<tr><td colspan='2'><div class='error-card'>${(err&&err.message)||'Failed to load dashboard'}</div></td></tr>`;})</script></body></html>
