<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Admin Dashboard</title><link rel='stylesheet' href='/css/style.css'></head><body>
<main class='container' style='margin-top:18px'><div class='admin'><aside class='sidebar'><h3>YMI Admin</h3><a class='active' href='/dashboard.html'>Dashboard</a><a href='/posts.html'>Posts</a><a href='/create-post.html'>Create Post</a><a href='/ai-reporter-admin.html'>AI Reporter</a><a href='/trending-manager.html'>Trending</a><a href='/users.html'>Users</a><a href='/cleanup.html'>Cleanup</a><a href='/bot-workflow.html'>Bot Workflow</a></aside><section><h1>Dashboard Overview</h1><div id='stats' class='stats'></div><div class='panel' style='margin-top:14px'><h3>Recent Posts</h3><table style='width:100%'><tbody id='recent'></tbody></table></div></section></div></main>
<script src='/js/api.js'></script><script>async function load(){const d=await api('/api/admin/dashboard');const stats=[['Total Posts',d.totalPosts],['Published',d.publishedPosts],['Pending',d.pendingPosts],['AI Generated',d.aiGeneratedPosts],['Trending',d.trendingPosts],['Users',d.users]];stats.forEach(s=>document.getElementById('stats').innerHTML+=`<div class='stat'><b>${s[0]}</b><div>${s[1]||0}</div></div>`);document.getElementById('recent').innerHTML=(d.recentPosts||[]).map(p=>`<tr><td>${p.title}</td><td>${p.status}</td><td>${new Date(p.created_at).toLocaleDateString()}</td></tr>`).join('')}load().catch(()=>location='/login.html');</script>
</body></html>
