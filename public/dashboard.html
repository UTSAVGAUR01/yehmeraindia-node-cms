<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Dashboard</title><link rel='stylesheet' href='/css/style.css'></head><body><main class='container' style='margin-top:18px'><div class='admin'><aside class='sidebar'><h3>YMI Admin</h3><a class='active' href='/dashboard.html'>Dashboard</a><a href='/posts.html'>Posts</a><a href='/create-post.html'>Create</a><a href='/trending-manager.html'>Trending</a><a href='/cleanup.html'>Cleanup</a><a href='/bot-workflow.html'>Bot Workflow</a><a href='/'>View Site</a></aside><section><h1>Dashboard Overview</h1><div id='stats' class='stats'></div><div class='panel' style='margin-top:12px'><h3>Recent Posts</h3><table style='width:100%'><tbody id='recent'></tbody></table></div></section></div></main><script src='/js/api.js'></script><script>async function load(){const d=await api('/api/admin/dashboard');const s=[['Total',d.totalPosts],['Published',d.publishedPosts],['Pending',d.pendingPosts],['AI',d.aiGeneratedPosts],['Trending',d.trendingPosts],['Users',d.users]];document.getElementById('stats').innerHTML=s.map(x=>`<div class='stat'><b>${x[0]}</b><div>${x[1]||0}</div></div>`).join('');document.getElementById('recent').innerHTML=(d.recentPosts||[]).map(p=>`<tr><td>${p.title}</td><td>${p.status}</td></tr>`).join('')||'<tr><td>No posts</td></tr>';}load().catch(()=>location='/login.html');</script></body></html>
