<!doctype html><html><head><meta charset='UTF-8'><link rel='stylesheet' href='/css/admin.css'><title>Dashboard</title></head><body><div class='admin'><aside class='side'><h2>Admin</h2>
<a href='/dashboard.html'>Overview</a><a href='/posts.html'>Posts</a><a href='/create-post.html'>Create Post</a><a href='/trending-manager.html'>Trending Manager</a><a href='/ai-reporter-admin.html'>AI Reporter</a><a href='/users.html'>Users</a><a href='/categories-admin.html'>Categories</a><a href='/cleanup.html'>Cleanup</a><a href='/bot-workflow.html'>Bot Workflow</a><a href='/'>View Site</a><a href='#' id='logout'>Logout</a></aside>
<main class='main'><h1>Newsroom Dashboard</h1><div id='stats' class='stats'></div><button class='btn' id='seed'>Create Demo AI News Posts</button><section class='panel'><h3>Recent Posts</h3><table class='table'><tbody id='recent'></tbody></table></section></main></div>
<script src='/js/api.js'></script><script>
logout.onclick=async(e)=>{e.preventDefault();await api('/api/auth/logout',{method:'POST'});location='/login.html'};
seed.onclick=async()=>{await api('/api/admin/seed-demo-posts',{method:'POST'});load()};
async function load(){const d=await api('/api/admin/dashboard');stats.innerHTML=[['Total posts',d.totalPosts],['Published',d.publishedPosts],['Pending',d.pendingPosts],['AI posts',d.aiGeneratedPosts],['Trending',d.trendingPosts],['Users',d.users],['Deleted today',d.deletedToday],['Last cleanup',d.lastCleanupAt||'N/A']].map(x=>`<div class='stat'><small>${x[0]}</small><strong>${x[1]}</strong></div>`).join('');recent.innerHTML=(d.recentPosts||[]).map(p=>`<tr><td>${p.title}</td><td>${p.status}</td></tr>`).join('')||'<tr><td>No recent posts.</td></tr>'}
load().catch((err)=>{if(err.status===401){location='/login.html';return;}stats.innerHTML=`<div class='error-card'>Dashboard data could not be loaded. Please check API/database. (${err.message})</div>`;});
</script></body></html>
