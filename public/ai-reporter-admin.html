<!doctype html><html><body><h1>AI Reporter Admin</h1><form id='f'><input name='topic' placeholder='Topic'><input name='category' placeholder='Category'><input name='location' placeholder='Location'><select name='language'><option>English</option><option>Hindi</option><option>Hinglish</option></select><select name='tone'><option>Breaking</option><option>Simple</option><option>Serious</option><option>Youth/Social</option></select><textarea name='notes'></textarea><label><input type='checkbox' name='generateVisualPrompt' checked>Visual prompt</label><label><input type='checkbox' name='generateAnchorScript' checked>Anchor script</label><button>Generate AI News</button></form><button id='th'>Run Threat Check</button><pre id='out'></pre><script src='/js/api.js'></script><script>th.onclick=async()=>{const fd=Object.fromEntries(new FormData(f).entries());out.textContent=JSON.stringify(await api('/api/admin/bots/run-threat-check',{method:'POST',body:JSON.stringify({text:(fd.topic||'')+' '+(fd.notes||'')})}),null,2)};f.onsubmit=async(e)=>{e.preventDefault();const fd=Object.fromEntries(new FormData(f).entries());fd.generateVisualPrompt=f.generateVisualPrompt.checked;fd.generateAnchorScript=f.generateAnchorScript.checked;const r=await api('/api/ai/generate-news',{method:'POST',body:JSON.stringify(fd)});out.textContent=JSON.stringify(r,null,2)}</script></body></html>
