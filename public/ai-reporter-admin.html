<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='/css/admin.css'><title>AI Reporter Admin</title></head><body><div class='admin'><aside class='side'><a href='/dashboard.html'>Dashboard</a><a href='/ai-reporter-admin.html'>AI Reporter</a><a href='/create-post.html'>Create Post</a></aside><main class='main'><h1>AI Reporter Workflow</h1><div class='panel'><form id='f' class='form-grid'><input name='topic' placeholder='Topic' required><input name='category' placeholder='Category'><input name='location' placeholder='Location/State'><select name='language'><option>English</option><option>Hindi</option><option>Hinglish</option></select><select name='tone'><option>Simple</option><option>Breaking</option><option>Serious</option></select><textarea name='notes' placeholder='Notes'></textarea><label><input type='checkbox' name='generateVisualPrompt' checked> Visual Prompt</label><label><input type='checkbox' name='generateAnchorScript' checked> Anchor Script</label><button class='btn'>Generate AI News</button></form></div><div class='panel'><h3>Preview</h3><pre id='out'></pre><button class='btn' id='save'>Save Draft</button> <button class='btn alt' id='publish'>Publish</button></div></main></div><script src='/js/api.js'></script><script>let latest=null;f.onsubmit=async(e)=>{e.preventDefault();const fd=Object.fromEntries(new FormData(f).entries());fd.generateVisualPrompt=f.generateVisualPrompt.checked;fd.generateAnchorScript=f.generateAnchorScript.checked;try{const r=await api('/api/ai/generate-news',{method:'POST',body:JSON.stringify(fd)});latest=r.data||r;out.textContent=JSON.stringify(r,null,2);}catch(err){out.textContent=err.message+(err.data?`\n${JSON.stringify(err.data,null,2)}`:'');}};async function save(status){if(!latest)return alert('Generate first');const payload={title:latest.headline,caption:latest.caption,summary:latest.summary,content:latest.article,category:f.category.value||'ai-reporter',source_name:'Yeh Mera India AI Desk',source_url:'',status,ai_generated:true};try{await api('/api/posts',{method:'POST',body:JSON.stringify(payload)});alert('Saved');}catch(e){alert(e.message)}}save.onclick=()=>save('pending');publish.onclick=()=>save('published');</script></body></html>
