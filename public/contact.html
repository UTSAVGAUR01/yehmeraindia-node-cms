<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Yeh Mera India</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg-gray-50 text-gray-900">
  <header class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-orange-600 font-bold text-xl">Yeh Mera India</a>
      <nav class="text-sm font-semibold text-gray-600 space-x-4">
        <a href="/" class="hover:text-orange-600">Home</a>
        <a href="/trending.html" class="hover:text-orange-600">Trending</a>
        <a href="/ai-reporter.html" class="hover:text-orange-600">AI Reporter</a>
      </nav>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-4 py-10">
    <h1 class="text-4xl font-bold mb-6">Contact Us</h1>
    <p class="text-gray-700 mb-4">We'd love to hear from you! Whether you have feedback, questions, collaboration requests or want to contribute a story, please get in touch using the form below.</p>
    <form id="contactForm" class="space-y-5 max-w-lg">
      <div>
        <label class="font-bold">Name</label>
        <input id="contactName" required class="mt-2 w-full px-4 py-3 rounded-lg border" />
      </div>
      <div>
        <label class="font-bold">Email</label>
        <input id="contactEmail" type="email" required class="mt-2 w-full px-4 py-3 rounded-lg border" />
      </div>
      <div>
        <label class="font-bold">Message</label>
        <textarea id="contactMessage" rows="5" required class="mt-2 w-full px-4 py-3 rounded-lg border"></textarea>
      </div>
      <button type="submit" class="px-6 py-3 bg-orange-600 text-white rounded-lg font-bold">Send Message</button>
      <p id="contactMsg" class="text-sm font-semibold mt-4"></p>
    </form>
  </main>
  <footer class="bg-gray-900 text-white py-6 mt-10 text-center text-sm">
    © 2026 Yeh Mera India
  </footer>
  <script>
    document.getElementById('contactForm').addEventListener('submit', (e) => {
      e.preventDefault();
      // This is a placeholder. In a real implementation, this would send the message via email or store in the DB.
      const msg = document.getElementById('contactMsg');
      msg.textContent = 'Thank you for your message! We will respond soon.';
      msg.className = 'text-green-600 mt-4';
      // Clear form
      document.getElementById('contactForm').reset();
    });
  </script>
</body>
</html>
