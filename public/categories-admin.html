<!doctype html><html><body><h1>Categories Admin</h1><form id='f'><input name='name' placeholder='Name'><input name='slug' placeholder='slug'><button>Add</button></form><div id='c'></div><script src='/js/api.js'></script><script>async function l(){const d=await api('/api/categories');c.innerHTML=d.map(x=>`<div>${x.name} <button onclick="del(${x.id})">Delete</button></div>`).join('')}f.onsubmit=async(e)=>{e.preventDefault();const fd=Object.fromEntries(new FormData(f).entries());await api('/api/admin/categories',{method:'POST',body:JSON.stringify(fd)});l()};async function del(id){await api('/api/admin/categories/'+id,{method:'DELETE'});l()}l();</script></body></html>
