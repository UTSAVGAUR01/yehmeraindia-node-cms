<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Yeh Mera India</title><link rel='stylesheet' href='/css/style.css'></head><body><script src='/js/portal.js'></script><script>document.write(Portal.topbar())</script>
<main class='container'><section class='hero'><div class='hero-wrap'><div><h1>The Real Story. <span style='color:var(--saffron)'>The Indian Voice.</span></h1><p>AI-powered, people-first news that matters to Bharat.</p></div><img src='/images/hero-banner.svg'></div></section><section><h3>Categories</h3><div id='cats' class='pills'></div></section><section><div class='section-head'><h2>Top Stories</h2><a href='/trending'>View All</a></div><div id='news' class='grid news-grid'></div></section></main>
<script>(async()=>{const [posts,cats]=await Promise.all([Portal.API.json('/api/trending',[]),Portal.API.json('/api/categories',[])]);cats.forEach((c,i)=>cats[i]=`<a class='pill ${i===0?'active':''}' href='/category/${c.slug}'>${Portal.API.esc(c.name)}</a>`);document.getElementById('cats').innerHTML=cats.join('');document.getElementById('news').innerHTML=posts.slice(0,8).map(Portal.card).join('')||'<p class="meta">No stories yet.</p>';})();</script></body></html>
