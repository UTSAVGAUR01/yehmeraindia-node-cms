<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Yeh Mera India</title><link rel='stylesheet' href='/css/style.css'/></head>
<body>
<header><div class='container nav'><h1>🇮🇳 Yeh Mera India</h1><nav class='nav-links'><a href='/'>Home</a><a href='/trending.html'>Trending</a><a href='/categories.html'>Categories</a><a href='/ai-reporter.html'>AI Reporter</a><a href='/dashboard.html'>Admin</a></nav></div></header>
<main class='container'>
<section class='hero'><h2>AI News from the Heart of Bharat</h2><p>Fresh, positive, verified stories with Indian values.</p></section>
<h2>Categories</h2><div id='cats' class='pills'></div>
<h2>🔥 Trending AI Stories</h2><section id='news' class='grid news-grid'></section>
</main>
<footer><div class='container'><p>Yeh Mera India • Built with B12-aligned newsroom workflow</p></div></footer>
<script>
const api=(p)=>fetch(p).then(r=>r.json()).catch(()=>[]);
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
(async()=>{
 const [posts,cats]=await Promise.all([api('/api/trending'),api('/api/categories')]);
 document.getElementById('cats').innerHTML=(cats||[]).map(c=>`<a class='pill' href='/category.html?slug=${encodeURIComponent(c.slug)}'>${esc(c.name)}</a>`).join('');
 document.getElementById('news').innerHTML=(posts||[]).slice(0,9).map(p=>`<article class='card'><img src='${esc(p.image||'/assets/img/news-placeholder.svg')}' onerror="this.src='/assets/img/news-placeholder.svg'"/><div class='card-body'><span class='badge'>${esc(p.category||'General')}</span><h3><a href='/news.html?slug=${encodeURIComponent(p.slug)}'>${esc(p.title)}</a></h3><p>${esc(p.excerpt||'')}</p><div class='actions'><span>👍 ${p.likes_count||0}</span><span>💬 ${p.comments_count||0}</span><span>🔁 ${p.shares_count||0}</span></div></div></article>`).join('');
})();
</script>
</body></html>
