<!doctype html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='stylesheet' href='/css/admin.css'><title>Create Post</title></head><body><div class='admin'><aside class='side'><a href='/dashboard.html'>Dashboard</a><a href='/posts.html'>Posts</a><a href='/create-post.html'>Create Post</a><a href='/'>View Site</a></aside><main class='main'><h1>Create Post</h1><div class='panel'><form id='f' class='form-grid'><input name='title' placeholder='Title' required><input name='caption' placeholder='Caption'><textarea name='summary' placeholder='Summary'></textarea><textarea name='content' placeholder='Content' required></textarea><input name='category' placeholder='Category'><input name='image' placeholder='Image URL'><input name='source_name' placeholder='Source name'><input name='source_url' placeholder='Source URL'><select name='status'><option value='pending'>Draft</option><option value='published'>Published</option></select><label><input type='checkbox' name='ai_generated'> AI generated</label><label><input type='checkbox' name='is_protected'> Protected</label><div><button class='btn' type='submit'>Save Draft</button> <button class='btn alt' type='button' id='pub'>Publish</button></div></form><p id='m'></p></div></main></div><script src='/js/api.js'></script><script>async function submit(status){const fd=Object.fromEntries(new FormData(f).entries());fd.ai_generated=f.ai_generated.checked;fd.is_protected=f.is_protected.checked;fd.status=status||fd.status;try{await api('/api/admin/posts',{method:'POST',body:JSON.stringify(fd)});m.textContent='Saved successfully';f.reset();}catch(e){m.textContent=e.message;}}f.onsubmit=(e)=>{e.preventDefault();submit('pending')};pub.onclick=()=>submit('published');</script></body></html>
