<!doctype html><html><head><link rel='stylesheet' href='/css/admin.css'></head><body><div class='main'><h1>Create Post</h1><form id='f'><input name='title' placeholder='Title'><input name='caption' placeholder='Caption'><textarea name='summary' placeholder='Summary'></textarea><textarea name='content' placeholder='Content'></textarea><input name='category' placeholder='Category'><input name='image' placeholder='Image URL'><input name='source_name' placeholder='Source name'><input name='source_url' placeholder='Source URL'><label><input type='checkbox' name='ai_generated'>AI generated</label><select name='status'><option>pending</option><option>published</option></select><button>Create</button></form><p id='m'></p></div><script src='/js/api.js'></script><script>f.onsubmit=async(e)=>{e.preventDefault();const fd=Object.fromEntries(new FormData(f).entries());fd.ai_generated=!!f.ai_generated.checked;await api('/api/posts',{method:'POST',body:JSON.stringify(fd)});m.textContent='Created';f.reset()}</script></body></html>
